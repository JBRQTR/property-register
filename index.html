<script>
  // The app's bootstrap script (near the bottom of this file) waits on this
  // promise before it starts, so it never runs before Firebase is ready.
  window.__cloudSyncReady = new Promise((resolve) => { window.__resolveCloudSync = resolve; });

  // Register service worker for offline use + installability
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch((e) => console.warn("SW registration failed", e));
    });
  }
</script>

<script type="module">
  // ---------------------------------------------------------------------
  // Cross-device sync via Firebase (Authentication + Firestore).
  //
  // >>> PASTE YOUR OWN FIREBASE PROJECT CONFIG BELOW <<<
  // Get this from: Firebase console → your project → Project settings
  // (gear icon) → General tab → "Your apps" → the web app → SDK setup.
  // These values are meant to be public/client-side; access is controlled
  // by the Firestore security rules, not by keeping this config secret.
  // ---------------------------------------------------------------------
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
  import {
    getAuth, onAuthStateChanged, signInWithEmailAndPassword,
    createUserWithEmailAndPassword, signOut,
  } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
  import {
    getFirestore, doc, getDoc, setDoc,
  } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

  const firebaseConfig = {
  apiKey: "AIzaSyBVOySJX_cyBYHvhmQwBYSBx46xoBdu6o",
  authDomain: "the-register-668ef.firebaseapp.com",
  projectId: "the-register-668ef",
  storageBucket: "the-register-668ef.firebasestorage.app",
  messagingSenderId: "1045749131861",
  appId: "1:1045749131861:web:e11339975ce14858b302dc",
  measurementId: "G-BZ4HEZNVEF"
};

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  window.cloudAuth = {
    onAuthStateChanged: (cb) => onAuthStateChanged(auth, cb),
    signIn: (email, password) => signInWithEmailAndPassword(auth, email, password),
    signUp: (email, password) => createUserWithEmailAndPassword(auth, email, password),
    signOut: () => signOut(auth),
  };

  // Same get/set shape the app already expects — now backed by Firestore,
  // scoped to the signed-in user, instead of this device's localStorage.
  window.storage = {
    get: async (key) => {
      const uid = auth.currentUser && auth.currentUser.uid;
      if (!uid) return null;
      const snap = await getDoc(doc(db, "users", uid, "kv", key));
      if (!snap.exists()) return null;
      return { key, value: snap.data().value };
    },
    set: async (key, value) => {
      const uid = auth.currentUser && auth.currentUser.uid;
      if (!uid) return null;
      await setDoc(doc(db, "users", uid, "kv", key), { value, updatedAt: Date.now() });
      return { key, value };
    },
  };

  window.__resolveCloudSync();
</script>

<script type="text/plain" id="app-source">
const { useState, useEffect, useMemo } = React;

// ---------------------------------------------------------------------------
// Icons — small hand-drawn set (stroke-based, 24x24), no external icon package
// ---------------------------------------------------------------------------
function Icon({ children, size = 16, style }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"
      strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}>
      {children}
    </svg>
  );
}
const LayoutDashboard = (p) => <Icon {...p}><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></Icon>;
const Building2 = (p) => <Icon {...p}><rect x="4" y="3" width="16" height="18" rx="1"/><path d="M9 8h1M14 8h1M9 12h1M14 12h1M9 16h1M14 16h1"/></Icon>;
const Home = (p) => <Icon {...p}><path d="M3 11l9-7 9 7"/><path d="M5 10v10h14V10"/></Icon>;
const Users = (p) => <Icon {...p}><circle cx="9" cy="8" r="3"/><path d="M2 20c0-3.5 3-6 7-6s7 2.5 7 6"/><circle cx="17" cy="9" r="2.5"/><path d="M16 20c0-2.5 1.5-4.5 4-5"/></Icon>;
const Wallet = (p) => <Icon {...p}><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 10h18"/><circle cx="16" cy="14.5" r="1"/></Icon>;
const Wrench = (p) => <Icon {...p}><path d="M14.7 6.3a4 4 0 00-5.4 5.4L3 18l3 3 6.3-6.3a4 4 0 005.4-5.4l-2.6 2.6-2-2z"/></Icon>;
const FileText = (p) => <Icon {...p}><path d="M6 2h9l5 5v15H6z"/><path d="M15 2v5h5"/><path d="M9 13h6M9 17h6"/></Icon>;
const Receipt = (p) => <Icon {...p}><path d="M5 3h14v18l-2.5-1.5L14 21l-2.5-1.5L9 21l-2.5-1.5L5 21z"/><path d="M8 8h8M8 12h8"/></Icon>;
const Plus = (p) => <Icon {...p}><path d="M12 5v14M5 12h14"/></Icon>;
const Search = (p) => <Icon {...p}><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></Icon>;
const X = (p) => <Icon {...p}><path d="M18 6L6 18M6 6l12 12"/></Icon>;
const Pencil = (p) => <Icon {...p}><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4z"/></Icon>;
const Trash2 = (p) => <Icon {...p}><path d="M3 6h18"/><path d="M8 6V4h8v2M6 6l1 15h10l1-15"/><path d="M10 11v6M14 11v6"/></Icon>;
const ChevronDown = (p) => <Icon {...p}><path d="M6 9l6 6 6-6"/></Icon>;
const ChevronRight = (p) => <Icon {...p}><path d="M9 18l6-6-6-6"/></Icon>;
const Menu = (p) => <Icon {...p}><path d="M3 6h18M3 12h18M3 18h18"/></Icon>;

// ---------------------------------------------------------------------------
// Design tokens — "the ledger": a working register for a property owner.
// ---------------------------------------------------------------------------
const C = {
  ink: "#20303A", inkSoft: "#63737B", paper: "#F5F1E8", card: "#FFFFFF",
  line: "#DED6C3", brass: "#A2793D", brassDark: "#8A6531",
  moss: "#4B6C54", mossBg: "#E7EEE7", rust: "#A44A32", rustBg: "#F5E5DE", amberBg: "#F1E8D4",
};
const displayFont = "'Fraunces', Georgia, serif";
const bodyFont = "'Inter', system-ui, sans-serif";
const monoFont = "'IBM Plex Mono', ui-monospace, monospace";

const uid = () => Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4);
const todayISO = () => new Date().toISOString().slice(0, 10);
function fmtMoney(n) { const v = Number(n) || 0; return "QAR " + v.toLocaleString("en-US", { maximumFractionDigits: 0 }); }
function fmtDate(d) { if (!d) return "—"; const dt = new Date(d + "T00:00:00"); if (isNaN(dt)) return d; return dt.toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" }); }
function daysUntil(d) { if (!d) return null; const dt = new Date(d + "T00:00:00"); const now = new Date(todayISO() + "T00:00:00"); return Math.round((dt - now) / 86400000); }

const EMPTY_STATE = { properties: [], units: [], tenants: [], payments: [], maintenance: [], documents: [], expenses: [] };
const STORAGE_KEY = "pm-store-v1";

function Pill({ children, tone = "neutral" }) {
  const tones = { neutral: { bg: "#EEEAE0", fg: C.inkSoft }, good: { bg: C.mossBg, fg: C.moss }, bad: { bg: C.rustBg, fg: C.rust }, warn: { bg: C.amberBg, fg: C.brassDark } };
  const t = tones[tone] || tones.neutral;
  return <span className="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium" style={{ background: t.bg, color: t.fg, fontFamily: bodyFont }}>{children}</span>;
}
function IconBtn({ onClick, title, children }) {
  return <button onClick={onClick} title={title} className="p-1.5 rounded hover:bg-black/5 transition-colors" style={{ color: C.inkSoft }}>{children}</button>;
}
function PrimaryButton({ onClick, children, icon: I }) {
  return (
    <button onClick={onClick} className="inline-flex items-center gap-1.5 px-3.5 py-2 rounded-md text-sm font-medium transition-colors"
      style={{ background: C.brass, color: "#fff", fontFamily: bodyFont }}
      onMouseEnter={(e) => (e.currentTarget.style.background = C.brassDark)}
      onMouseLeave={(e) => (e.currentTarget.style.background = C.brass)}>
      {I && <I size={15} />}{children}
    </button>
  );
}
function Card({ children, className = "", style = {} }) {
  return <div className={"rounded-lg " + className} style={{ background: C.card, border: `1px solid ${C.line}`, ...style }}>{children}</div>;
}
function EmptyState({ icon: I, title, hint, actionLabel, onAction }) {
  return (
    <div className="flex flex-col items-center justify-center text-center py-16 px-6">
      <div className="w-12 h-12 rounded-full flex items-center justify-center mb-4" style={{ background: C.amberBg }}><I size={22} style={{ color: C.brassDark }} /></div>
      <div style={{ fontFamily: displayFont, color: C.ink }} className="text-lg font-semibold mb-1">{title}</div>
      <div style={{ color: C.inkSoft, fontFamily: bodyFont }} className="text-sm mb-5 max-w-sm">{hint}</div>
      {actionLabel && <PrimaryButton onClick={onAction} icon={Plus}>{actionLabel}</PrimaryButton>}
    </div>
  );
}
function SearchInput({ value, onChange, placeholder }) {
  return (
    <div className="relative">
      <Search size={15} className="absolute left-2.5 top-1/2 -translate-y-1/2" style={{ color: C.inkSoft }} />
      <input value={value} onChange={(e) => onChange(e.target.value)} placeholder={placeholder}
        className="pl-8 pr-3 py-1.5 rounded-md text-sm outline-none w-56"
        style={{ background: C.paper, border: `1px solid ${C.line}`, fontFamily: bodyFont, color: C.ink }} />
    </div>
  );
}
function Select({ value, onChange, options, placeholder }) {
  return (
    <select value={value} onChange={(e) => onChange(e.target.value)} className="px-2.5 py-1.5 rounded-md text-sm outline-none"
      style={{ background: C.paper, border: `1px solid ${C.line}`, fontFamily: bodyFont, color: C.ink }}>
      {placeholder && <option value="">{placeholder}</option>}
      {options.map((o) => <option key={o.value} value={o.value}>{o.label}</option>)}
    </select>
  );
}

function FormModal({ title, fields, initialValues, onSave, onClose, saveLabel = "Save" }) {
  const [values, setValues] = useState(() => { const v = { ...initialValues }; fields.forEach((f) => { if (v[f.key] === undefined) v[f.key] = f.default ?? ""; }); return v; });
  const set = (k, val) => setValues((v) => ({ ...v, [k]: val }));
  const canSave = fields.every((f) => !f.required || String(values[f.key] ?? "").trim() !== "");
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{ background: "rgba(32,48,58,0.45)" }}>
      <div className="w-full max-w-lg max-h-[85vh] overflow-y-auto rounded-xl shadow-xl" style={{ background: C.card, fontFamily: bodyFont }}>
        <div className="flex items-center justify-between px-5 py-4 sticky top-0" style={{ background: C.card, borderBottom: `1px solid ${C.line}` }}>
          <div style={{ fontFamily: displayFont, color: C.ink }} className="text-lg font-semibold">{title}</div>
          <IconBtn onClick={onClose}><X size={18} /></IconBtn>
        </div>
        <div className="px-5 py-4 grid grid-cols-2 gap-4">
          {fields.map((f) => (
            <div key={f.key} className={f.wide ? "col-span-2" : "col-span-1"}>
              <label className="block text-xs font-medium mb-1" style={{ color: C.inkSoft }}>{f.label}{f.required && <span style={{ color: C.rust }}> *</span>}</label>
              {f.type === "select" ? (
                <select value={values[f.key]} onChange={(e) => set(f.key, e.target.value)} className="w-full px-2.5 py-2 rounded-md text-sm outline-none" style={{ background: C.paper, border: `1px solid ${C.line}`, color: C.ink }}>
                  <option value="">Select…</option>
                  {f.options.map((o) => <option key={o.value} value={o.value}>{o.label}</option>)}
                </select>
              ) : f.type === "textarea" ? (
                <textarea value={values[f.key]} onChange={(e) => set(f.key, e.target.value)} rows={3} className="w-full px-2.5 py-2 rounded-md text-sm outline-none resize-none" style={{ background: C.paper, border: `1px solid ${C.line}`, color: C.ink }} />
              ) : (
                <input type={f.type || "text"} value={values[f.key]} onChange={(e) => set(f.key, e.target.value)} className="w-full px-2.5 py-2 rounded-md text-sm outline-none" style={{ background: C.paper, border: `1px solid ${C.line}`, color: C.ink, fontFamily: f.mono ? monoFont : bodyFont }} />
              )}
            </div>
          ))}
        </div>
        <div className="flex justify-end gap-2 px-5 py-4" style={{ borderTop: `1px solid ${C.line}` }}>
          <button onClick={onClose} className="px-3.5 py-2 rounded-md text-sm font-medium" style={{ color: C.inkSoft }}>Cancel</button>
          <button disabled={!canSave} onClick={() => canSave && onSave(values)} className="px-3.5 py-2 rounded-md text-sm font-medium" style={{ background: canSave ? C.brass : C.line, color: canSave ? "#fff" : C.inkSoft }}>{saveLabel}</button>
        </div>
      </div>
    </div>
  );
}
function ConfirmDialog({ message, onConfirm, onCancel }) {
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{ background: "rgba(32,48,58,0.45)" }}>
      <div className="w-full max-w-sm rounded-xl p-5" style={{ background: C.card, fontFamily: bodyFont }}>
        <div className="text-sm mb-4" style={{ color: C.ink }}>{message}</div>
        <div className="flex justify-end gap-2">
          <button onClick={onCancel} className="px-3.5 py-2 rounded-md text-sm font-medium" style={{ color: C.inkSoft }}>Cancel</button>
          <button onClick={onConfirm} className="px-3.5 py-2 rounded-md text-sm font-medium" style={{ background: C.rust, color: "#fff" }}>Delete</button>
        </div>
      </div>
    </div>
  );
}

function SignIn() {
  const [mode, setMode] = useState("signin");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [busy, setBusy] = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    setError("");
    setBusy(true);
    try {
      if (mode === "signin") await window.cloudAuth.signIn(email, password);
      else await window.cloudAuth.signUp(email, password);
    } catch (err) {
      setError((err && err.message ? err.message : "Something went wrong.").replace("Firebase: ", ""));
    }
    setBusy(false);
  };

  return (
    <div className="min-h-screen flex items-center justify-center p-4" style={{ background: C.paper, fontFamily: bodyFont }}>
      <Card className="w-full max-w-sm p-6">
        <div style={{ fontFamily: displayFont, color: C.ink }} className="text-xl font-semibold mb-1">The Register</div>
        <div className="text-sm mb-5" style={{ color: C.inkSoft }}>{mode === "signin" ? "Sign in to your ledger" : "Create your account"}</div>
        <form onSubmit={submit} className="flex flex-col gap-3">
          <input
            type="email" required placeholder="Email" value={email} autoComplete="email"
            onChange={(e) => setEmail(e.target.value)}
            className="px-3 py-2 rounded-md text-sm outline-none"
            style={{ background: C.paper, border: `1px solid ${C.line}`, color: C.ink }}
          />
          <input
            type="password" required placeholder="Password" value={password}
            autoComplete={mode === "signin" ? "current-password" : "new-password"}
            onChange={(e) => setPassword(e.target.value)}
            className="px-3 py-2 rounded-md text-sm outline-none"
            style={{ background: C.paper, border: `1px solid ${C.line}`, color: C.ink }}
          />
          {error && <div className="text-xs" style={{ color: C.rust }}>{error}</div>}
          <button
            disabled={busy} type="submit"
            className="px-3.5 py-2 rounded-md text-sm font-medium mt-1"
            style={{ background: C.brass, color: "#fff", opacity: busy ? 0.7 : 1 }}
          >
            {busy ? "Please wait…" : mode === "signin" ? "Sign in" : "Create account"}
          </button>
        </form>
        <button
          onClick={() => { setMode(mode === "signin" ? "signup" : "signin"); setError(""); }}
          className="text-xs mt-4 font-medium"
          style={{ color: C.brass }}
        >
          {mode === "signin" ? "New here? Create an account" : "Already have an account? Sign in"}
        </button>
        <div className="text-xs mt-5" style={{ color: C.inkSoft }}>
          Sign in with the same email on your other device to see the same data there.
        </div>
      </Card>
    </div>
  );
}

const NAV = [
  { key: "dashboard", label: "Dashboard", icon: LayoutDashboard },
  { key: "properties", label: "Properties", icon: Building2 },
  { key: "units", label: "Units", icon: Home },
  { key: "tenants", label: "Tenants", icon: Users },
  { key: "payments", label: "Payments", icon: Wallet },
  { key: "maintenance", label: "Maintenance", icon: Wrench },
  { key: "documents", label: "Documents", icon: FileText },
  { key: "expenses", label: "Expenses", icon: Receipt },
];

function App() {
  const [tab, setTab] = useState("dashboard");
  const [navOpen, setNavOpen] = useState(false);
  const [store, setStore] = useState(EMPTY_STATE);
  const [loaded, setLoaded] = useState(false);
  const [modal, setModal] = useState(null);
  const [confirm, setConfirm] = useState(null);
  const [user, setUser] = useState(undefined); // undefined = checking, null = signed out, object = signed in

  useEffect(() => {
    const unsub = window.cloudAuth.onAuthStateChanged((u) => setUser(u || null));
    return unsub;
  }, []);

  useEffect(() => {
    if (!user) return;
    setLoaded(false);
    (async () => {
      try {
        const res = await window.storage.get(STORAGE_KEY);
        setStore(res && res.value ? { ...EMPTY_STATE, ...JSON.parse(res.value) } : EMPTY_STATE);
      } catch (e) { console.error("Load failed", e); }
      setLoaded(true);
    })();
  }, [user]);

  useEffect(() => {
    if (!loaded) return;
    (async () => { try { await window.storage.set(STORAGE_KEY, JSON.stringify(store)); } catch (e) { console.error("Save failed", e); } })();
  }, [store, loaded]);

  const update = (fn) => setStore((s) => fn(JSON.parse(JSON.stringify(s))));

  const propertyOptions = store.properties.map((p) => ({ value: p.id, label: p.name }));
  const unitLabel = (u) => { const p = store.properties.find((p) => p.id === u.propertyId); return (p ? p.name + " · " : "") + "Unit " + u.unitNumber; };
  const vacantUnitOptions = store.units.filter((u) => u.status === "Vacant").map((u) => ({ value: u.id, label: unitLabel(u) }));
  const allUnitOptions = store.units.map((u) => ({ value: u.id, label: unitLabel(u) }));
  const tenantOptions = store.tenants.map((t) => ({ value: t.id, label: t.name }));

  const kpis = useMemo(() => {
    const totalUnits = store.units.length;
    const occupied = store.units.filter((u) => u.status === "Occupied").length;
    const occupancy = totalUnits ? Math.round((occupied / totalUnits) * 100) : 0;
    const expectedRent = store.units.filter((u) => u.status === "Occupied").reduce((a, u) => a + Number(u.rentAmount || 0), 0);
    const thisMonth = todayISO().slice(0, 7);
    const collected = store.payments.filter((p) => p.status === "Paid" && (p.paidDate || "").slice(0, 7) === thisMonth).reduce((a, p) => a + Number(p.amount || 0), 0);
    const overdue = store.payments.filter((p) => p.status !== "Paid" && p.dueDate && p.dueDate < todayISO());
    const overdueTotal = overdue.reduce((a, p) => a + Number(p.amount || 0), 0);
    const openMaint = store.maintenance.filter((m) => m.status !== "Resolved").length;
    const expiringLeases = store.tenants.filter((t) => { const d = daysUntil(t.leaseEnd); return d !== null && d >= 0 && d <= 60; });
    return { totalUnits, occupied, occupancy, expectedRent, collected, overdue, overdueTotal, openMaint, expiringLeases };
  }, [store]);

  if (user === undefined) return <div className="min-h-screen flex items-center justify-center" style={{ background: C.paper, fontFamily: bodyFont, color: C.inkSoft }}>Checking sign-in…</div>;
  if (user === null) return <SignIn />;
  if (!loaded) return <div className="min-h-screen flex items-center justify-center" style={{ background: C.paper, fontFamily: bodyFont, color: C.inkSoft }}>Loading your register…</div>;

  return (
    <div className="min-h-screen flex" style={{ background: C.paper, fontFamily: bodyFont }}>
      <aside className={`fixed md:static z-40 h-full md:h-auto w-64 shrink-0 flex flex-col transition-transform ${navOpen ? "translate-x-0" : "-translate-x-full md:translate-x-0"}`} style={{ background: C.ink, minHeight: "100vh" }}>
        <div className="px-5 pt-6 pb-5" style={{ borderBottom: "1px solid rgba(255,255,255,0.08)" }}>
          <div style={{ fontFamily: displayFont, color: "#fff" }} className="text-xl font-semibold leading-tight">The Register</div>
          <div className="text-xs mt-0.5" style={{ color: "rgba(255,255,255,0.5)" }}>Property &amp; tenant ledger</div>
        </div>
        <nav className="px-3 py-4 flex flex-col gap-0.5">
          {NAV.map((n) => {
            const active = tab === n.key;
            return (
              <button key={n.key} onClick={() => { setTab(n.key); setNavOpen(false); }} className="flex items-center gap-2.5 px-3 py-2 rounded-md text-sm font-medium transition-colors"
                style={{ background: active ? "rgba(162,121,61,0.22)" : "transparent", color: active ? "#E8C88E" : "rgba(255,255,255,0.72)" }}>
                <n.icon size={16} />{n.label}
              </button>
            );
          })}
        </nav>
        <div className="px-3 mt-auto pb-5 pt-4" style={{ borderTop: "1px solid rgba(255,255,255,0.08)" }}>
          <div className="text-xs px-3 mb-1.5 truncate" style={{ color: "rgba(255,255,255,0.45)" }}>{user.email}</div>
          <button onClick={() => window.cloudAuth.signOut()} className="px-3 py-1.5 rounded-md text-xs font-medium" style={{ color: "rgba(255,255,255,0.6)" }}>Sign out</button>
        </div>
      </aside>
      {navOpen && <div className="fixed inset-0 bg-black/40 z-30 md:hidden" onClick={() => setNavOpen(false)} />}

      <main className="flex-1 min-w-0">
        <div className="md:hidden flex items-center gap-3 px-4 py-3" style={{ borderBottom: `1px solid ${C.line}` }}>
          <button onClick={() => setNavOpen(true)}><Menu size={20} style={{ color: C.ink }} /></button>
          <div style={{ fontFamily: displayFont, color: C.ink }} className="font-semibold">The Register</div>
        </div>
        <div className="p-5 md:p-8 max-w-6xl mx-auto">
          {tab === "dashboard" && <Dashboard store={store} kpis={kpis} setTab={setTab} unitLabel={unitLabel} />}
          {tab === "properties" && <PropertiesTab store={store} update={update} setModal={setModal} setConfirm={setConfirm} />}
          {tab === "units" && <UnitsTab store={store} update={update} setModal={setModal} setConfirm={setConfirm} propertyOptions={propertyOptions} unitLabel={unitLabel} />}
          {tab === "tenants" && <TenantsTab store={store} update={update} setModal={setModal} setConfirm={setConfirm} unitLabel={unitLabel} vacantUnitOptions={vacantUnitOptions} allUnitOptions={allUnitOptions} />}
          {tab === "payments" && <PaymentsTab store={store} update={update} setModal={setModal} setConfirm={setConfirm} tenantOptions={tenantOptions} unitLabel={unitLabel} />}
          {tab === "maintenance" && <MaintenanceTab store={store} update={update} setModal={setModal} setConfirm={setConfirm} allUnitOptions={allUnitOptions} unitLabel={unitLabel} />}
          {tab === "documents" && <DocumentsTab store={store} update={update} setModal={setModal} setConfirm={setConfirm} propertyOptions={propertyOptions} tenantOptions={tenantOptions} />}
          {tab === "expenses" && <ExpensesTab store={store} update={update} setModal={setModal} setConfirm={setConfirm} propertyOptions={propertyOptions} />}
        </div>
      </main>
      {modal}
      {confirm && <ConfirmDialog message={confirm.message} onCancel={() => setConfirm(null)} onConfirm={() => { confirm.onConfirm(); setConfirm(null); }} />}
    </div>
  );
}

function Dashboard({ store, kpis, setTab, unitLabel }) {
  const kpiCards = [

    { label: "Rent roll (occupied)", value: fmtMoney(kpis.expectedRent), sub: "Expected monthly rent" },
    { label: "Collected this month", value: fmtMoney(kpis.collected), sub: "Payments marked paid" },
    { label: "Overdue", value: fmtMoney(kpis.overdueTotal), sub: `${kpis.overdue.length} payment(s) past due`, tone: kpis.overdue.length ? "bad" : "good" },

  return (
    <div>
      <div className="mb-6">
        <div style={{ fontFamily: displayFont, color: C.ink }} className="text-2xl font-semibold">Dashboard</div>

      </div>
      <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
        {kpiCards.map((k) => (
          <Card key={k.label} className="p-4">
            <div className="text-xs font-medium mb-2" style={{ color: C.inkSoft }}>{k.label}</div>
            <div style={{ fontFamily: monoFont, color: k.tone === "bad" ? C.rust : k.tone === "good" ? C.moss : C.ink }} className="text-2xl font-semibold tabular-nums">{k.value}</div>
            <div className="text-xs mt-1" style={{ color: C.inkSoft }}>{k.sub}</div>
          </Card>
        ))}
      </div>
      <div className="grid md:grid-cols-2 gap-5">
        <Card className="p-5">
          <div className="flex items-center justify-between mb-3">
            <div style={{ fontFamily: displayFont, color: C.ink }} className="font-semibold">Overdue payments</div>
            <button onClick={() => setTab("payments")} className="text-xs font-medium" style={{ color: C.brass }}>View all</button>
          </div>
          {kpis.overdue.length === 0 ? <div className="text-sm py-6 text-center" style={{ color: C.inkSoft }}>Nothing overdue — the ledger is clean.</div> : (
            <div className="flex flex-col gap-2">
              {kpis.overdue.slice(0, 6).map((p) => {
                const t = store.tenants.find((t) => t.id === p.tenantId);
                return (
                  <div key={p.id} className="flex items-center justify-between text-sm py-1.5" style={{ borderBottom: `1px solid ${C.line}` }}>
                    <div><div style={{ color: C.ink }}>{t ? t.name : "Unknown tenant"}</div><div className="text-xs" style={{ color: C.inkSoft }}>Due {fmtDate(p.dueDate)}</div></div>
                    <div style={{ fontFamily: monoFont, color: C.rust }} className="font-medium">{fmtMoney(p.amount)}</div>
                  </div>
                );
              })}
            </div>

        </Card>
        <Card className="p-5">
          <div className="flex items-center justify-between mb-3">
            <div style={{ fontFamily: displayFont, color: C.ink }} className="font-semibold">Leases expiring soon</div>
            <button onClick={() => setTab("tenants")} className="text-xs font-medium" style={{ color: C.brass }}>View all</button>
          </div>
          {kpis.expiringLeases.length === 0 ? <div className="text-sm py-6 text-center" style={{ color: C.inkSoft }}>Nothing expiring in the next 60 days.</div> : (
            <div className="flex flex-col gap-2">
              {kpis.expiringLeases.map((t) => {
                const u = store.units.find((u) => u.id === t.unitId); const d = daysUntil(t.leaseEnd);
                return (
                  <div key={t.id} className="flex items-center justify-between text-sm py-1.5" style={{ borderBottom: `1px solid ${C.line}` }}>
                    <div><div style={{ color: C.ink }}>{t.name}</div><div className="text-xs" style={{ color: C.inkSoft }}>{u ? unitLabel(u) : "—"}</div></div>

                  </div>
                );
              })}
            </div>

        </Card>
        <Card className="p-5">
          <div className="flex items-center justify-between mb-3">
            <div style={{ fontFamily: displayFont, color: C.ink }} className="font-semibold">Open maintenance requests</div>
            <button onClick={() => setTab("maintenance")} className="text-xs font-medium" style={{ color: C.brass }}>View all</button>
          </div>
          {kpis.openMaint === 0 ? <div className="text-sm py-6 text-center" style={{ color: C.inkSoft }}>No open requests.</div> : (
            <div className="flex flex-col gap-2">
              {store.maintenance.filter((m) => m.status !== "Resolved").slice(0, 6).map((m) => (
                <div key={m.id} className="flex items-center justify-between text-sm py-1.5" style={{ borderBottom: `1px solid ${C.line}` }}>
                  <div><div style={{ color: C.ink }}>{m.title}</div><div className="text-xs" style={{ color: C.inkSoft }}>{unitLabel(store.units.find((u) => u.id === m.unitId) || {})}</div></div>
                  <Pill tone={m.priority === "Urgent" ? "bad" : m.priority === "High" ? "warn" : "neutral"}>{m.priority}</Pill>
                </div>
              ))}
            </div>
          )}
        </Card>
        <Card className="p-5">
          <div className="flex items-center justify-between mb-3"><div style={{ fontFamily: displayFont, color: C.ink }} className="font-semibold">Portfolio</div></div>
          <div className="flex flex-col gap-2">
            <div className="flex justify-between text-sm py-1.5" style={{ borderBottom: `1px solid ${C.line}` }}><span style={{ color: C.inkSoft }}>Properties</span><span style={{ fontFamily: monoFont, color: C.ink }}>{store.properties.length}</span></div>
            <div className="flex justify-between text-sm py-1.5" style={{ borderBottom: `1px solid ${C.line}` }}><span style={{ color: C.inkSoft }}>Total units</span><span style={{ fontFamily: monoFont, color: C.ink }}>{kpis.totalUnits}</span></div>
            <div className="flex justify-between text-sm py-1.5" style={{ borderBottom: `1px solid ${C.line}` }}><span style={{ color: C.inkSoft }}>Active tenants</span><span style={{ fontFamily: monoFont, color: C.ink }}>{store.tenants.length}</span></div>
            <div className="flex justify-between text-sm py-1.5"><span style={{ color: C.inkSoft }}>Vacant units</span><span style={{ fontFamily: monoFont, color: C.ink }}>{kpis.totalUnits - kpis.occupied}</span></div>
          </div>
        </Card>
      </div>
    </div>
  );
}

const PROPERTY_TYPES = ["Apartment Building", "Villa", "Compound", "Townhouse", "Commercial"].map((v) => ({ value: v, label: v }));

function PropertiesTab({ store, update, setModal, setConfirm }) {
  const [expanded, setExpanded] = useState({});
  const [search, setSearch] = useState("");
  const propertyFields = [
    { key: "name", label: "Property name", required: true, wide: true },
    { key: "address", label: "Address", required: true, wide: true },
    { key: "type", label: "Type", type: "select", options: PROPERTY_TYPES, required: true },
    { key: "notes", label: "Notes", type: "textarea", wide: true },
  ];
  const unitFields = () => [
    { key: "unitNumber", label: "Unit number", required: true },
    { key: "bedrooms", label: "Bedrooms", type: "number" },
    { key: "bathrooms", label: "Bathrooms", type: "number" },
    { key: "sizeSqm", label: "Size (sqm)", type: "number" },
    { key: "rentAmount", label: "Monthly rent (QAR)", type: "number", required: true, mono: true },
    { key: "notes", label: "Notes", type: "textarea", wide: true },
  ];
  const openAddProperty = () => setModal(<FormModal title="Add property" fields={propertyFields} initialValues={{}} onClose={() => setModal(null)} onSave={(v) => { update((s) => { s.properties.push({ id: uid(), ...v }); return s; }); setModal(null); }} />);
  const openEditProperty = (p) => setModal(<FormModal title="Edit property" fields={propertyFields} initialValues={p} onClose={() => setModal(null)} onSave={(v) => { update((s) => { const i = s.properties.findIndex((x) => x.id === p.id); s.properties[i] = { ...s.properties[i], ...v }; return s; }); setModal(null); }} />);
  const openAddUnit = (propertyId) => setModal(<FormModal title="Add unit" fields={unitFields()} initialValues={{}} onClose={() => setModal(null)} onSave={(v) => { update((s) => { s.units.push({ id: uid(), propertyId, status: "Vacant", tenantId: null, ...v }); return s; }); setModal(null); }} />);
  const filtered = store.properties.filter((p) => (p.name + p.address).toLowerCase().includes(search.toLowerCase()));
  return (
    <div>
      <div className="flex items-center justify-between mb-5 flex-wrap gap-3">
        <div><div style={{ fontFamily: displayFont, color: C.ink }} className="text-2xl font-semibold">Properties</div><div className="text-sm" style={{ color: C.inkSoft }}>{store.properties.length} properties in your portfolio</div></div>
        <div className="flex items-center gap-2"><SearchInput value={search} onChange={setSearch} placeholder="Search properties…" /><PrimaryButton onClick={openAddProperty} icon={Plus}>Add property</PrimaryButton></div>
      </div>
      {store.properties.length === 0 ? <Card><EmptyState icon={Building2} title="No properties yet" hint="Add your first property to start tracking units, tenants and rent." actionLabel="Add property" onAction={openAddProperty} /></Card> : (
        <div className="flex flex-col gap-3">
          {filtered.map((p) => {
            const units = store.units.filter((u) => u.propertyId === p.id);
            const occ = units.filter((u) => u.status === "Occupied").length;
            const isOpen = !!expanded[p.id];
            return (
              <Card key={p.id}>
                <div className="flex items-center justify-between p-4 cursor-pointer" onClick={() => setExpanded((e) => ({ ...e, [p.id]: !e[p.id] }))}>
                  <div className="flex items-center gap-3">
                    {isOpen ? <ChevronDown size={16} style={{ color: C.inkSoft }} /> : <ChevronRight size={16} style={{ color: C.inkSoft }} />}
                    <div><div style={{ fontFamily: displayFont, color: C.ink }} className="font-semibold">{p.name}</div><div className="text-xs" style={{ color: C.inkSoft }}>{p.address}</div></div>
                  </div>
                  <div className="flex items-center gap-4">
                    <Pill>{p.type}</Pill>
                    <div className="text-xs" style={{ color: C.inkSoft }}>{occ}/{units.length} occupied</div>
                    <IconBtn title="Edit" onClick={(e) => { e.stopPropagation(); openEditProperty(p); }}><Pencil size={14} /></IconBtn>
                    <IconBtn title="Delete" onClick={(e) => { e.stopPropagation(); setConfirm({ message: `Delete "${p.name}" and all its units? This cannot be undone.`, onConfirm: () => update((s) => { const unitIds = s.units.filter((u) => u.propertyId === p.id).map((u) => u.id); s.units = s.units.filter((u) => u.propertyId !== p.id); s.properties = s.properties.filter((x) => x.id !== p.id); s.tenants = s.tenants.filter((t) => !unitIds.includes(t.unitId)); return s; }) }); }}><Trash2 size={14} /></IconBtn>
                  </div>
                </div>
                {isOpen && (
                  <div className="px-4 pb-4" style={{ borderTop: `1px solid ${C.line}` }}>
                    <div className="flex items-center justify-between mt-3 mb-2">
                      <div className="text-xs font-medium" style={{ color: C.inkSoft }}>UNITS</div>
                      <button onClick={() => openAddUnit(p.id)} className="text-xs font-medium inline-flex items-center gap-1" style={{ color: C.brass }}><Plus size={13} /> Add unit</button>
                    </div>
                    {units.length === 0 ? <div className="text-sm py-3" style={{ color: C.inkSoft }}>No units added yet.</div> : (
                      <div className="flex flex-col gap-1.5">
                        {units.map((u) => {
                          const tenant = store.tenants.find((t) => t.id === u.tenantId);
                          return (
                            <div key={u.id} className="flex items-center justify-between text-sm py-1.5 px-2 rounded" style={{ background: C.paper }}>
                              <div className="flex items-center gap-3"><span style={{ color: C.ink }} className="font-medium">Unit {u.unitNumber}</span><span className="text-xs" style={{ color: C.inkSoft }}>{u.bedrooms || 0} bed · {u.bathrooms || 0} bath{u.sizeSqm ? ` · ${u.sizeSqm} sqm` : ""}</span></div>
                              <div className="flex items-center gap-3"><span style={{ fontFamily: monoFont, color: C.ink }}>{fmtMoney(u.rentAmount)}</span><Pill tone={u.status === "Occupied" ? "good" : "neutral"}>{u.status}</Pill>{tenant && <span className="text-xs" style={{ color: C.inkSoft }}>{tenant.name}</span>}</div>
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>
                )}
              </Card>
            );
          })}
        </div>
      )}
    </div>
  );
}

function UnitsTab({ store, update, setModal, setConfirm, propertyOptions, unitLabel }) {
  const [search, setSearch] = useState(""); const [propFilter, setPropFilter] = useState(""); const [statusFilter, setStatusFilter] = useState("");
  const unitFields = [
    { key: "propertyId", label: "Property", type: "select", options: propertyOptions, required: true },
    { key: "unitNumber", label: "Unit number", required: true },
    { key: "bedrooms", label: "Bedrooms", type: "number" },
    { key: "bathrooms", label: "Bathrooms", type: "number" },
    { key: "sizeSqm", label: "Size (sqm)", type: "number" },
    { key: "rentAmount", label: "Monthly rent (QAR)", type: "number", required: true, mono: true },
    { key: "notes", label: "Notes", type: "textarea", wide: true },
  ];
  const openAdd = () => setModal(<FormModal title="Add unit" fields={unitFields} initialValues={{}} onClose={() => setModal(null)} onSave={(v) => { update((s) => { s.units.push({ id: uid(), status: "Vacant", tenantId: null, ...v }); return s; }); setModal(null); }} />);
  const openEdit = (u) => setModal(<FormModal title="Edit unit" fields={unitFields} initialValues={u} onClose={() => setModal(null)} onSave={(v) => { update((s) => { const i = s.units.findIndex((x) => x.id === u.id); s.units[i] = { ...s.units[i], ...v }; return s; }); setModal(null); }} />);
  const filtered = store.units.filter((u) => { if (propFilter && u.propertyId !== propFilter) return false; if (statusFilter && u.status !== statusFilter) return false; if (search && !unitLabel(u).toLowerCase().includes(search.toLowerCase())) return false; return true; });
  return (
    <div>
      <div className="flex items-center justify-between mb-5 flex-wrap gap-3">
        <div><div style={{ fontFamily: displayFont, color: C.ink }} className="text-2xl font-semibold">Units</div><div className="text-sm" style={{ color: C.inkSoft }}>{store.units.length} units across all properties</div></div>
        <div className="flex items-center gap-2 flex-wrap">
          <SearchInput value={search} onChange={setSearch} placeholder="Search units…" />
          <Select value={propFilter} onChange={setPropFilter} options={propertyOptions} placeholder="All properties" />
          <Select value={statusFilter} onChange={setStatusFilter} options={[{ value: "Occupied", label: "Occupied" }, { value: "Vacant", label: "Vacant" }]} placeholder="All statuses" />
          <PrimaryButton onClick={openAdd} icon={Plus}>Add unit</PrimaryButton>
        </div>
      </div>
      {store.units.length === 0 ? <Card><EmptyState icon={Home} title="No units yet" hint="Add units to a property, or create one directly here." actionLabel="Add unit" onAction={openAdd} /></Card> : (
        <Card className="overflow-hidden"><table className="w-full text-sm"><thead><tr style={{ borderBottom: `1px solid ${C.line}`, color: C.inkSoft }}>
          <th className="text-left font-medium px-4 py-2.5">Unit</th><th className="text-left font-medium px-4 py-2.5">Details</th><th className="text-left font-medium px-4 py-2.5">Rent</th><th className="text-left font-medium px-4 py-2.5">Status</th><th className="text-right font-medium px-4 py-2.5">Actions</th>
        </tr></thead><tbody>
          {filtered.map((u) => (
            <tr key={u.id} style={{ borderBottom: `1px solid ${C.line}` }}>
              <td className="px-4 py-2.5" style={{ color: C.ink }}>{unitLabel(u)}</td>
              <td className="px-4 py-2.5" style={{ color: C.inkSoft }}>{u.bedrooms || 0} bed · {u.bathrooms || 0} bath{u.sizeSqm ? ` · ${u.sizeSqm} sqm` : ""}</td>
              <td className="px-4 py-2.5" style={{ fontFamily: monoFont, color: C.ink }}>{fmtMoney(u.rentAmount)}</td>
              <td className="px-4 py-2.5"><Pill tone={u.status === "Occupied" ? "good" : "neutral"}>{u.status}</Pill></td>
              <td className="px-4 py-2.5 text-right"><IconBtn title="Edit" onClick={() => openEdit(u)}><Pencil size={14} /></IconBtn><IconBtn title="Delete" onClick={() => setConfirm({ message: `Delete unit ${u.unitNumber}?`, onConfirm: () => update((s) => { s.units = s.units.filter((x) => x.id !== u.id); return s; }) })}><Trash2 size={14} /></IconBtn></td>
            </tr>
          ))}
        </tbody></table></Card>
      )}
    </div>
  );
}

function TenantsTab({ store, update, setModal, setConfirm, unitLabel, vacantUnitOptions, allUnitOptions }) {
  const [search, setSearch] = useState("");
  const tenantFields = (editing) => [
    { key: "name", label: "Full name", required: true },
    { key: "phone", label: "Phone" },
    { key: "email", label: "Email", type: "email" },
    { key: "unitId", label: "Unit", type: "select", options: editing ? allUnitOptions : vacantUnitOptions, required: true },
    { key: "leaseStart", label: "Lease start", type: "date" },
    { key: "leaseEnd", label: "Lease end", type: "date" },
    { key: "depositAmount", label: "Deposit (QAR)", type: "number", mono: true },
    { key: "notes", label: "Notes", type: "textarea", wide: true },
  ];
  const openAdd = () => setModal(<FormModal title="Add tenant" fields={tenantFields(false)} initialValues={{}} onClose={() => setModal(null)} onSave={(v) => { update((s) => { s.tenants.push({ id: uid(), status: "Active", ...v }); const ui = s.units.findIndex((u) => u.id === v.unitId); if (ui > -1) { s.units[ui].status = "Occupied"; s.units[ui].tenantId = s.tenants[s.tenants.length - 1].id; } return s; }); setModal(null); }} />);
  const openEdit = (t) => setModal(<FormModal title="Edit tenant" fields={tenantFields(true)} initialValues={t} onClose={() => setModal(null)} onSave={(v) => { update((s) => { const i = s.tenants.findIndex((x) => x.id === t.id); if (t.unitId && t.unitId !== v.unitId) { const oldU = s.units.findIndex((u) => u.id === t.unitId); if (oldU > -1) { s.units[oldU].status = "Vacant"; s.units[oldU].tenantId = null; } } s.tenants[i] = { ...s.tenants[i], ...v }; const newU = s.units.findIndex((u) => u.id === v.unitId); if (newU > -1) { s.units[newU].status = "Occupied"; s.units[newU].tenantId = t.id; } return s; }); setModal(null); }} />);
  const filtered = store.tenants.filter((t) => t.name.toLowerCase().includes(search.toLowerCase()));
  return (
    <div>
      <div className="flex items-center justify-between mb-5 flex-wrap gap-3">
        <div><div style={{ fontFamily: displayFont, color: C.ink }} className="text-2xl font-semibold">Tenants</div><div className="text-sm" style={{ color: C.inkSoft }}>{store.tenants.length} tenants on record</div></div>
        <div className="flex items-center gap-2"><SearchInput value={search} onChange={setSearch} placeholder="Search tenants…" /><PrimaryButton onClick={openAdd} icon={Plus}>Add tenant</PrimaryButton></div>
      </div>
      {store.tenants.length === 0 ? <Card><EmptyState icon={Users} title="No tenants yet" hint="Add a tenant and assign them to a vacant unit." actionLabel="Add tenant" onAction={openAdd} /></Card> : (
        <div className="grid md:grid-cols-2 gap-3">
          {filtered.map((t) => {
            const u = store.units.find((u) => u.id === t.unitId); const d = daysUntil(t.leaseEnd);
            return (
              <Card key={t.id} className="p-4">
                <div className="flex items-start justify-between">
                  <div><div style={{ fontFamily: displayFont, color: C.ink }} className="font-semibold">{t.name}</div><div className="text-xs mt-0.5" style={{ color: C.inkSoft }}>{u ? unitLabel(u) : "Unassigned"}</div></div>
                  <div className="flex gap-1"><IconBtn title="Edit" onClick={() => openEdit(t)}><Pencil size={14} /></IconBtn><IconBtn title="Delete" onClick={() => setConfirm({ message: `Delete tenant "${t.name}"? Their unit will become vacant.`, onConfirm: () => update((s) => { const ui = s.units.findIndex((u) => u.id === t.unitId); if (ui > -1) { s.units[ui].status = "Vacant"; s.units[ui].tenantId = null; } s.tenants = s.tenants.filter((x) => x.id !== t.id); return s; }) })}><Trash2 size={14} /></IconBtn></div>
                </div>
                <div className="mt-3 grid grid-cols-2 gap-y-1.5 text-xs" style={{ color: C.inkSoft }}>
                  <div>{t.phone || "No phone"}</div><div>{t.email || "No email"}</div>
                  <div>Lease: {fmtDate(t.leaseStart)} → {fmtDate(t.leaseEnd)}</div>
                  <div>Deposit: <span style={{ fontFamily: monoFont, color: C.ink }}>{fmtMoney(t.depositAmount)}</span></div>
                </div>
                {d !== null && d <= 60 && d >= 0 && <div className="mt-2"><Pill tone={d <= 14 ? "bad" : "warn"}>Lease ends in {d} day{d === 1 ? "" : "s"}</Pill></div>}
                {d !== null && d < 0 && <div className="mt-2"><Pill tone="bad">Lease expired</Pill></div>}
              </Card>
            );
          })}
        </div>
      )}
    </div>
  );
}

const PAYMENT_METHODS = ["Cash", "Bank Transfer", "Cheque", "Card"].map((v) => ({ value: v, label: v }));
function PaymentsTab({ store, update, setModal, setConfirm, tenantOptions, unitLabel }) {
  const [statusFilter, setStatusFilter] = useState("");
  const paymentFields = [
    { key: "tenantId", label: "Tenant", type: "select", options: tenantOptions, required: true },
    { key: "amount", label: "Amount (QAR)", type: "number", required: true, mono: true },
    { key: "dueDate", label: "Due date", type: "date", required: true },
    { key: "paidDate", label: "Paid date (leave blank if unpaid)", type: "date" },
    { key: "method", label: "Method", type: "select", options: PAYMENT_METHODS },
    { key: "notes", label: "Notes", type: "textarea", wide: true },
  ];
  const deriveStatus = (v) => (v.paidDate ? "Paid" : (v.dueDate && v.dueDate < todayISO() ? "Overdue" : "Pending"));
  const openAdd = () => setModal(<FormModal title="Record payment" fields={paymentFields} initialValues={{ dueDate: todayISO() }} onClose={() => setModal(null)} onSave={(v) => { const t = store.tenants.find((t) => t.id === v.tenantId); update((s) => { s.payments.push({ id: uid(), unitId: t ? t.unitId : null, status: deriveStatus(v), ...v }); return s; }); setModal(null); }} />);
  const openEdit = (p) => setModal(<FormModal title="Edit payment" fields={paymentFields} initialValues={p} onClose={() => setModal(null)} onSave={(v) => { update((s) => { const i = s.payments.findIndex((x) => x.id === p.id); s.payments[i] = { ...s.payments[i], ...v, status: deriveStatus(v) }; return s; }); setModal(null); }} />);
  const markPaid = (p) => update((s) => { const i = s.payments.findIndex((x) => x.id === p.id); s.payments[i] = { ...s.payments[i], paidDate: todayISO(), status: "Paid" }; return s; });
  const rows = store.payments.map((p) => ({ ...p, status: deriveStatus(p) })).filter((p) => !statusFilter || p.status === statusFilter).sort((a, b) => (b.dueDate || "").localeCompare(a.dueDate || ""));
  return (
    <div>
      <div className="flex items-center justify-between mb-5 flex-wrap gap-3">
        <div><div style={{ fontFamily: displayFont, color: C.ink }} className="text-2xl font-semibold">Payments</div><div className="text-sm" style={{ color: C.inkSoft }}>{store.payments.length} payment records</div></div>
        <div className="flex items-center gap-2"><Select value={statusFilter} onChange={setStatusFilter} options={[{ value: "Paid", label: "Paid" }, { value: "Pending", label: "Pending" }, { value: "Overdue", label: "Overdue" }]} placeholder="All statuses" /><PrimaryButton onClick={openAdd} icon={Plus}>Record payment</PrimaryButton></div>
      </div>
      {store.payments.length === 0 ? <Card><EmptyState icon={Wallet} title="No payments recorded" hint="Log rent payments to track what's collected and what's overdue." actionLabel="Record payment" onAction={openAdd} /></Card> : (
        <Card className="overflow-hidden"><table className="w-full text-sm"><thead><tr style={{ borderBottom: `1px solid ${C.line}`, color: C.inkSoft }}>
          <th className="text-left font-medium px-4 py-2.5">Tenant</th><th className="text-left font-medium px-4 py-2.5">Unit</th><th className="text-left font-medium px-4 py-2.5">Amount</th><th className="text-left font-medium px-4 py-2.5">Due</th><th className="text-left font-medium px-4 py-2.5">Status</th><th className="text-right font-medium px-4 py-2.5">Actions</th>
        </tr></thead><tbody>
          {rows.map((p) => {
            const t = store.tenants.find((t) => t.id === p.tenantId); const u = store.units.find((u) => u.id === p.unitId);
            return (
              <tr key={p.id} style={{ borderBottom: `1px solid ${C.line}` }}>
                <td className="px-4 py-2.5" style={{ color: C.ink }}>{t ? t.name : "—"}</td>
                <td className="px-4 py-2.5" style={{ color: C.inkSoft }}>{u ? unitLabel(u) : "—"}</td>
                <td className="px-4 py-2.5" style={{ fontFamily: monoFont, color: C.ink }}>{fmtMoney(p.amount)}</td>
                <td className="px-4 py-2.5" style={{ color: C.inkSoft }}>{fmtDate(p.dueDate)}</td>
                <td className="px-4 py-2.5"><Pill tone={p.status === "Paid" ? "good" : p.status === "Overdue" ? "bad" : "warn"}>{p.status}</Pill></td>
                <td className="px-4 py-2.5 text-right whitespace-nowrap">
                  {p.status !== "Paid" && <button onClick={() => markPaid(p)} className="text-xs font-medium mr-2" style={{ color: C.moss }}>Mark paid</button>}
                  <IconBtn title="Edit" onClick={() => openEdit(p)}><Pencil size={14} /></IconBtn>
                  <IconBtn title="Delete" onClick={() => setConfirm({ message: "Delete this payment record?", onConfirm: () => update((s) => { s.payments = s.payments.filter((x) => x.id !== p.id); return s; }) })}><Trash2 size={14} /></IconBtn>
                </td>
              </tr>
            );
          })}
        </tbody></table></Card>
      )}
    </div>
  );
}

const PRIORITIES = ["Low", "Medium", "High", "Urgent"].map((v) => ({ value: v, label: v }));
const STATUSES = ["Open", "In Progress", "Resolved"].map((v) => ({ value: v, label: v }));
function MaintenanceTab({ store, update, setModal, setConfirm, allUnitOptions, unitLabel }) {
  const [statusFilter, setStatusFilter] = useState("");
  const fields = [
    { key: "title", label: "Issue", required: true, wide: true },
    { key: "unitId", label: "Unit", type: "select", options: allUnitOptions, required: true },
    { key: "priority", label: "Priority", type: "select", options: PRIORITIES, default: "Medium" },
    { key: "status", label: "Status", type: "select", options: STATUSES, default: "Open" },
    { key: "dateReported", label: "Date reported", type: "date", default: todayISO() },
    { key: "cost", label: "Cost (QAR)", type: "number", mono: true },
    { key: "description", label: "Description", type: "textarea", wide: true },
  ];
  const openAdd = () => setModal(<FormModal title="Log maintenance request" fields={fields} initialValues={{}} onClose={() => setModal(null)} onSave={(v) => { update((s) => { s.maintenance.push({ id: uid(), ...v }); return s; }); setModal(null); }} />);
  const openEdit = (m) => setModal(<FormModal title="Edit maintenance request" fields={fields} initialValues={m} onClose={() => setModal(null)} onSave={(v) => { update((s) => { const i = s.maintenance.findIndex((x) => x.id === m.id); s.maintenance[i] = { ...s.maintenance[i], ...v }; return s; }); setModal(null); }} />);
  const rows = store.maintenance.filter((m) => !statusFilter || m.status === statusFilter);
  const prioTone = { Urgent: "bad", High: "warn", Medium: "neutral", Low: "neutral" };
  return (
    <div>
      <div className="flex items-center justify-between mb-5 flex-wrap gap-3">
        <div><div style={{ fontFamily: displayFont, color: C.ink }} className="text-2xl font-semibold">Maintenance</div><div className="text-sm" style={{ color: C.inkSoft }}>{store.maintenance.length} requests logged</div></div>
        <div className="flex items-center gap-2"><Select value={statusFilter} onChange={setStatusFilter} options={STATUSES} placeholder="All statuses" /><PrimaryButton onClick={openAdd} icon={Plus}>Log request</PrimaryButton></div>
      </div>
      {store.maintenance.length === 0 ? <Card><EmptyState icon={Wrench} title="No maintenance requests" hint="Log repairs and upkeep to keep a record per unit." actionLabel="Log request" onAction={openAdd} /></Card> : (
        <div className="flex flex-col gap-2">
          {rows.map((m) => (
            <Card key={m.id} className="p-4 flex items-center justify-between flex-wrap gap-2">
              <div><div style={{ color: C.ink }} className="font-medium">{m.title}</div><div className="text-xs" style={{ color: C.inkSoft }}>{unitLabel(store.units.find((u) => u.id === m.unitId) || {})} · Reported {fmtDate(m.dateReported)}</div></div>
              <div className="flex items-center gap-3">
                {m.cost ? <span style={{ fontFamily: monoFont, color: C.ink }} className="text-sm">{fmtMoney(m.cost)}</span> : null}
                <Pill tone={prioTone[m.priority]}>{m.priority}</Pill><Pill tone={m.status === "Resolved" ? "good" : "neutral"}>{m.status}</Pill>
                <IconBtn title="Edit" onClick={() => openEdit(m)}><Pencil size={14} /></IconBtn>
                <IconBtn title="Delete" onClick={() => setConfirm({ message: "Delete this maintenance request?", onConfirm: () => update((s) => { s.maintenance = s.maintenance.filter((x) => x.id !== m.id); return s; }) })}><Trash2 size={14} /></IconBtn>
              </div>
            </Card>
          ))}
        </div>
      )}
    </div>
  );
}

const DOC_CATEGORIES = ["Tenancy Contract", "ID Copy", "Title Deed", "Insurance", "Trade License", "Other"].map((v) => ({ value: v, label: v }));
function DocumentsTab({ store, update, setModal, setConfirm, propertyOptions, tenantOptions }) {
  const fields = [
    { key: "title", label: "Document title", required: true, wide: true },
    { key: "category", label: "Category", type: "select", options: DOC_CATEGORIES, required: true },
    { key: "propertyId", label: "Related property", type: "select", options: propertyOptions },
    { key: "tenantId", label: "Related tenant", type: "select", options: tenantOptions },
    { key: "expiryDate", label: "Expiry date (if any)", type: "date" },
    { key: "notes", label: "Notes", type: "textarea", wide: true },
  ];
  const openAdd = () => setModal(<FormModal title="Log document" fields={fields} initialValues={{}} onClose={() => setModal(null)} onSave={(v) => { update((s) => { s.documents.push({ id: uid(), ...v }); return s; }); setModal(null); }} />);
  const openEdit = (d) => setModal(<FormModal title="Edit document" fields={fields} initialValues={d} onClose={() => setModal(null)} onSave={(v) => { update((s) => { const i = s.documents.findIndex((x) => x.id === d.id); s.documents[i] = { ...s.documents[i], ...v }; return s; }); setModal(null); }} />);
  return (
    <div>
      <div className="flex items-center justify-between mb-5 flex-wrap gap-3">
        <div><div style={{ fontFamily: displayFont, color: C.ink }} className="text-2xl font-semibold">Documents</div><div className="text-sm" style={{ color: C.inkSoft }}>{store.documents.length} records — contracts, IDs, deeds and more</div></div>
        <PrimaryButton onClick={openAdd} icon={Plus}>Log document</PrimaryButton>
      </div>
      {store.documents.length === 0 ? <Card><EmptyState icon={FileText} title="No documents logged" hint="Keep track of contracts, IDs and other paperwork, and get reminded before they expire. This stores document details, not file uploads." actionLabel="Log document" onAction={openAdd} /></Card> : (
        <div className="grid md:grid-cols-2 gap-3">
          {store.documents.map((d) => {
            const p = store.properties.find((p) => p.id === d.propertyId); const t = store.tenants.find((t) => t.id === d.tenantId); const days = daysUntil(d.expiryDate);
            return (
              <Card key={d.id} className="p-4">
                <div className="flex items-start justify-between">
                  <div><div style={{ fontFamily: displayFont, color: C.ink }} className="font-semibold">{d.title}</div><div className="text-xs mt-0.5" style={{ color: C.inkSoft }}>{[p && p.name, t && t.name].filter(Boolean).join(" · ") || "Not linked"}</div></div>
                  <div className="flex gap-1"><IconBtn title="Edit" onClick={() => openEdit(d)}><Pencil size={14} /></IconBtn><IconBtn title="Delete" onClick={() => setConfirm({ message: `Delete "${d.title}"?`, onConfirm: () => update((s) => { s.documents = s.documents.filter((x) => x.id !== d.id); return s; }) })}><Trash2 size={14} /></IconBtn></div>
                </div>
                <div className="mt-2 flex items-center gap-2 flex-wrap">
                  <Pill>{d.category}</Pill>
                  {d.expiryDate && <Pill tone={days < 0 ? "bad" : days <= 30 ? "warn" : "neutral"}>{days < 0 ? "Expired" : `Expires ${fmtDate(d.expiryDate)}`}</Pill>}
                </div>
              </Card>
            );
          })}
        </div>
      )}
    </div>
  );
}

const EXPENSE_CATEGORIES = ["Maintenance", "Utilities", "Insurance", "Municipality Fees", "Management Fee", "Other"].map((v) => ({ value: v, label: v }));
function ExpensesTab({ store, update, setModal, setConfirm, propertyOptions }) {
  const fields = [
    { key: "propertyId", label: "Property", type: "select", options: propertyOptions, required: true },
    { key: "category", label: "Category", type: "select", options: EXPENSE_CATEGORIES, required: true },
    { key: "amount", label: "Amount (QAR)", type: "number", required: true, mono: true },
    { key: "date", label: "Date", type: "date", default: todayISO(), required: true },
    { key: "notes", label: "Notes", type: "textarea", wide: true },
  ];
  const openAdd = () => setModal(<FormModal title="Log expense" fields={fields} initialValues={{}} onClose={() => setModal(null)} onSave={(v) => { update((s) => { s.expenses.push({ id: uid(), ...v }); return s; }); setModal(null); }} />);
  const openEdit = (e) => setModal(<FormModal title="Edit expense" fields={fields} initialValues={e} onClose={() => setModal(null)} onSave={(v) => { update((s) => { const i = s.expenses.findIndex((x) => x.id === e.id); s.expenses[i] = { ...s.expenses[i], ...v }; return s; }); setModal(null); }} />);
  const total = store.expenses.reduce((a, e) => a + Number(e.amount || 0), 0);
  const sorted = [...store.expenses].sort((a, b) => (b.date || "").localeCompare(a.date || ""));
  return (
    <div>
      <div className="flex items-center justify-between mb-5 flex-wrap gap-3">
        <div><div style={{ fontFamily: displayFont, color: C.ink }} className="text-2xl font-semibold">Expenses</div><div className="text-sm" style={{ color: C.inkSoft }}>Total logged: <span style={{ fontFamily: monoFont, color: C.ink }}>{fmtMoney(total)}</span></div></div>
        <PrimaryButton onClick={openAdd} icon={Plus}>Log expense</PrimaryButton>
      </div>
      {store.expenses.length === 0 ? <Card><EmptyState icon={Receipt} title="No expenses logged" hint="Track costs per property — maintenance, utilities, fees and more." actionLabel="Log expense" onAction={openAdd} /></Card> : (
        <Card className="overflow-hidden"><table className="w-full text-sm"><thead><tr style={{ borderBottom: `1px solid ${C.line}`, color: C.inkSoft }}>
          <th className="text-left font-medium px-4 py-2.5">Property</th><th className="text-left font-medium px-4 py-2.5">Category</th><th className="text-left font-medium px-4 py-2.5">Date</th><th className="text-left font-medium px-4 py-2.5">Amount</th><th className="text-right font-medium px-4 py-2.5">Actions</th>
        </tr></thead><tbody>
          {sorted.map((e) => {
            const p = store.properties.find((p) => p.id === e.propertyId);
            return (
              <tr key={e.id} style={{ borderBottom: `1px solid ${C.line}` }}>
                <td className="px-4 py-2.5" style={{ color: C.ink }}>{p ? p.name : "—"}</td>
                <td className="px-4 py-2.5"><Pill>{e.category}</Pill></td>
                <td className="px-4 py-2.5" style={{ color: C.inkSoft }}>{fmtDate(e.date)}</td>
                <td className="px-4 py-2.5" style={{ fontFamily: monoFont, color: C.ink }}>{fmtMoney(e.amount)}</td>
                <td className="px-4 py-2.5 text-right"><IconBtn title="Edit" onClick={() => openEdit(e)}><Pencil size={14} /></IconBtn><IconBtn title="Delete" onClick={() => setConfirm({ message: "Delete this expense record?", onConfirm: () => update((s) => { s.expenses = s.expenses.filter((x) => x.id !== e.id); return s; }) })}><Trash2 size={14} /></IconBtn></td>
              </tr>
            );
          })}
        </tbody></table></Card>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>

<script>
  // Manually run Babel with an explicit classic JSX runtime, rather than
  // relying on the auto-transform's default (which varies across Babel
  // versions and can otherwise try to import "react/jsx-runtime" as an ES
  // module — something a plain <script> page can't do, leaving a blank page).
  window.__cloudSyncReady.then(function () {
    var source = document.getElementById("app-source").textContent;
    var output = Babel.transform(source, {
      presets: [["react", { runtime: "classic" }]],
      filename: "app.jsx",
    }).code;
    var script = document.createElement("script");
    script.text = output;
    document.body.appendChild(script);
  });
</script>
</body>
